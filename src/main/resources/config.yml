# WebSocket サーバーのポート番号
# WebSocket server port number
websocket-port: 8887

# データの圧縮 (Gzip) を有効にするか
# 通信量を抑えたい場合は true 推奨
# Enable data compression (Gzip)
# Recommended to set to true if you want to reduce data usage
gzip-enabled: false

# 更新・送信間隔 (20 ticks = 1秒)
# Update and transmission interval (20 ticks = 1 second)
update-interval-ticks: 20

# エンドポイント
# Endpoint
endpoint: "https://example.com/status-api"

# 接続モードの設定
# DIRECT: 直接ポート開放する場合 (ws://)
# PROXY: Nginx等のリバースプロキシを通す場合 (wss://)
# TUNNEL: Cloudflare Tunnel等を使用する場合
# Connection Mode Settings
# DIRECT: When opening ports directly (ws://)
# PROXY: When routing through a reverse proxy such as Nginx (wss://)
# TUNNEL: When using Cloudflare Tunnel or similar services
connection-mode: DIRECT

# 認証用パスワード
# Authentication Password
api-key: "your-secret-key-here"

# プロキシ/トンネル使用時に、接続元の本当のIPを取得するかどうか
# Whether to retrieve the actual IP address of the connecting device when using a proxy or tunnel
trust-proxy-headers: true

# 接続制限（ホワイトリスト）
# Connection Restrictions (Whitelist)
whitelist:
  enabled: false
  # 接続を許可するIPアドレスのリスト
  # ローカルホストやWebサーバーのIPを指定
  # List of IP addresses allowed to connect
  # Specify the localhost or web server IP address
  allowed-ips:
    - "127.0.0.1"
    - "192.168.1.10"

