name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Lite edition
        run: ./gradlew shadowJar

      - name: Build Full edition
        run: ./gradlew shadowJar -Poshi

      # --- Modrinth への投稿 ---
      - name: Upload to Modrinth
        run: ./gradlew modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}

      # --- CurseForge への投稿 ---
      #- name: Upload to CurseForge
      #  uses: itsmeow/curseforge-upload@v3
      #  with:
      #    token: ${{ secrets.CURSEFORGE_TOKEN }}
      #    project_id: "YOUR_PROJECT_ID" # CurseForgeのプロジェクトID
      #    game_endpoint: "minecraft"
      #    file: "build/libs/MCOmniSight-${{ steps.get_version.outputs.VERSION }}.jar"
      #    release_type: "release"
      #    changelog: ${{ github.event.head_commit.message }}
      #    display_name: "MCOmniSight ${{ steps.get_version.outputs.VERSION }}"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          # build/libs 内にある全ての JAR をリリースに添付
          files: build/libs/*.jar
          name: Release ${{ github.ref_name }}
          body: |
            ## MCOmniSight ${{ github.ref_name }}
            
            最新リリースのMCOmniSight${{ project.version }}です。
            This is the latest release of MCOmniSight ${{ project.version }}.
            
            ### 📦 配布物の選び方 / How to Choose Handouts
            - **MCOmniSight-${ project.version }-full.jar**: 推奨版。CPU/GPU/ディスク等の詳細な統計が利用可能です。 / Recommended version. Detailed statistics on the CPU, GPU, disk, and other components are available.
            - **MCOmniSight-${ project.version }-lite.jar**: 軽量版。OSの詳細統計は不要で、チャットや参加ログのみ利用したい場合に使用します。 / Lightweight version. Use this if you don’t need detailed OS statistics and only want to use chat and participation logs.

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
