name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          name: Release ${{ github.ref_name }}
          body: |
            ## MCOmniSight ${{ github.ref_name }}
            
            MCOmniSight の最新リリースです。
            
            ### 🛠 修正・追加内容
            - 初回安定版リリース
            
            ### 📦 配布物
            - `MCOmniSight-x.x.x.jar` をサーバーの plugins フォルダに入れてください。
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
